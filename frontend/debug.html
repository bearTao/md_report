<!DOCTYPE html>
<html>
<head>
    <title>前端调试页面</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial; padding: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>前端调试诊断</h1>
    
    <div class="section">
        <h2>1. 检查前端服务</h2>
        <button onclick="checkFrontend()">测试前端连接</button>
        <div id="frontend-result"></div>
    </div>
    
    <div class="section">
        <h2>2. 检查后端服务</h2>
        <button onclick="checkBackend()">测试后端连接</button>
        <div id="backend-result"></div>
    </div>
    
    <div class="section">
        <h2>3. 测试简化版页面</h2>
        <p><a href="http://localhost:5174/templates/new/edit-simple" target="_blank">打开简化版编辑页面</a></p>
        <p>如果能显示，说明Monaco编辑器有问题</p>
    </div>
    
    <div class="section">
        <h2>4. 测试原版页面</h2>
        <p><a href="http://localhost:5174/templates/new/edit" target="_blank">打开原版编辑页面</a></p>
        <p>打开后按F12查看Console和Network标签</p>
    </div>
    
    <div class="section">
        <h2>5. 浏览器信息</h2>
        <pre id="browser-info"></pre>
    </div>
    
    <script>
        // 显示浏览器信息
        document.getElementById('browser-info').textContent = 
            'User Agent: ' + navigator.userAgent + '\n' +
            'Platform: ' + navigator.platform + '\n' +
            'Language: ' + navigator.language;
        
        async function checkFrontend() {
            const result = document.getElementById('frontend-result');
            result.innerHTML = '<p>🔄 测试中...</p>';
            
            try {
                const response = await fetch('http://localhost:5174/');
                if (response.ok) {
                    result.innerHTML = '<p class="success">✅ 前端服务正常 (状态: ' + response.status + ')</p>';
                } else {
                    result.innerHTML = '<p class="error">❌ 前端响应异常 (状态: ' + response.status + ')</p>';
                }
            } catch (error) {
                result.innerHTML = '<p class="error">❌ 无法连接前端: ' + error.message + '</p>';
            }
        }
        
        async function checkBackend() {
            const result = document.getElementById('backend-result');
            result.innerHTML = '<p>🔄 测试中...</p>';
            
            try {
                const response = await fetch('http://localhost:8000/health');
                const data = await response.json();
                result.innerHTML = '<p class="success">✅ 后端服务正常: ' + JSON.stringify(data) + '</p>';
            } catch (error) {
                result.innerHTML = '<p class="error">❌ 无法连接后端: ' + error.message + '</p>';
            }
        }
        
        // 自动检查
        window.onload = function() {
            checkFrontend();
            checkBackend();
        };
    </script>
</body>
</html>
